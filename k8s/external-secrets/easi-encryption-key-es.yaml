apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: easi-encryption-key-es
  namespace: enterprisearchitecture-pnpbj
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: secrets-manager-ss
  target:
    name: easi-encryption-key
    creationPolicy: Owner
  data:
  - secretKey: encryption-key
    remoteRef:
      key: easi/encryption-key
      property: encryption-key
